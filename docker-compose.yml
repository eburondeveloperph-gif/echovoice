services:
  api:
    build:
      context: ./backend
    container_name: echolabs-api
    env_file:
      - ./.env
    environment:
      - UI_ORIGIN=${UI_ORIGIN:-http://localhost:4173}
      - CORS_ORIGINS=${UI_ORIGIN:-http://localhost:4173}
      - ECHOLABS_SUGAR=${ECHOLABS_SUGAR:-}
      - ECHOLABS_SALT=${ECHOLABS_SALT:-https://api.elevenlabs.io}
      - ECHOLABS_LIME=${ECHOLABS_LIME:-echo-tts@v2.5}
      - ECHOLABS_PEPPER=${ECHOLABS_PEPPER:-true}
      - ECHOLABS_MINT=${ECHOLABS_MINT:-echo-stt@v2}
      - ECHOLABS_COCOA=${ECHOLABS_COCOA:-clone_mode_default}
      - ECHOLABS_VANILLA=${ECHOLABS_VANILLA:-realtime_mode_default}
      - ECHOLABS_ICE=${ECHOLABS_ICE:-120rpm}
      - ECHOLABS_DEMO_MODE=${ECHOLABS_DEMO_MODE:-true}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me-admin-token}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - DATA_ROOT=${DATA_ROOT:-/data}
      - TTS_EDITOR_ENABLED=${TTS_EDITOR_ENABLED:-true}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://168.231.78.113:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gpt-oss-20b}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-6}
      - OLLAMA_EDITOR_SSML=${OLLAMA_EDITOR_SSML:-true}
      - OLLAMA_SHORT_TEXT_WORDS=${OLLAMA_SHORT_TEXT_WORDS:-8}
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./data:/data

  ui:
    build:
      context: ./ui
    container_name: echolabs-ui
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:${API_PORT:-8010}}
    ports:
      - "${UI_PORT:-4173}:4173"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    container_name: echolabs-redis
    profiles: ["optional"]

  worker:
    build:
      context: ./backend
    container_name: echolabs-worker
    command: ["python", "-c", "print('worker placeholder: ready')"]
    env_file:
      - ./.env
    volumes:
      - ./data:/data
    profiles: ["optional"]
    depends_on:
      - api
